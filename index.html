    <!-- JavaScript for Interactions -->
    <script>
        document.addEventListener(&#39;DOMContentLoaded&#39;, () => {
            // 1. Scroll Animations (Intersection Observer)
            const observerOptions = {
                root: null,
                rootMargin: &#39;0px&#39;,
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add(&#39;visible&#39;);
                        observer.unobserve(entry.target); // Only animate once
                    }
                });
            }, observerOptions);

	            document.querySelectorAll(&#39;.fade-up&#39;).forEach(el => {
	                observer.observe(el);
	            });

	            // 1.1 Count-up Animation
	            const countUpObserver = new IntersectionObserver((entries) => {
	                entries.forEach(entry => {
	                    if (entry.isIntersecting) {
	                        const el = entry.target;
	                        const target = parseInt(el.getAttribute(&#39;data-target&#39;));
	                        const suffix = el.getAttribute(&#39;data-suffix&#39;) || &#39;&#39;;
	                        const prefix = el.getAttribute(&#39;data-prefix&#39;) || &#39;&#39;;
	                        const duration = 2000; // 2 seconds
	                        const startTime = performance.now();

	                        const updateCount = (currentTime) => {
	                            const elapsed = currentTime - startTime;
	                            const progress = Math.min(elapsed / duration, 1);
	                            
	                            // Ease-out-quart
	                            const easeProgress = 1 - Math.pow(1 - progress, 4);
	                            const currentCount = Math.floor(easeProgress * target);
	                            
	                            // Format number with commas if it&#39;s the prize
	                            const formattedCount = target > 999 ? currentCount.toLocaleString() : currentCount;
	                            
	                            el.textContent = prefix + formattedCount + (progress === 1 ? suffix : &#39;&#39;);

	                            if (progress < 1) {
	                                requestAnimationFrame(updateCount);
	                            }
	                        };

	                        requestAnimationFrame(updateCount);
	                        countUpObserver.unobserve(el);
	                    }
	                });
	            }, { threshold: 0.3 });

	            document.querySelectorAll(&#39;.stat-counter&#39;).forEach(el => {
	                countUpObserver.observe(el);
	            });

            // 2. Navbar Scroll Effect
            const navbar = document.getElementById(&#39;navbar&#39;);
            const logoText = document.querySelector(&#39;.logo-text&#39;);
            
            window.addEventListener(&#39;scroll&#39;, () => {
                if (window.scrollY > 50) {
                    navbar.classList.add(&#39;nav-scrolled&#39;);
                } else {
                    navbar.classList.remove(&#39;nav-scrolled&#39;);
                }
            });

            // 3. Mobile Menu Toggle
            const mobileBtn = document.getElementById(&#39;mobile-menu-btn&#39;);
            const mobileMenu = document.getElementById(&#39;mobile-menu&#39;);
            const hamburgerLines = document.querySelectorAll(&#39;.hamburger-line&#39;);
            const mobileLinks = document.querySelectorAll(&#39;.mobile-link&#39;);
            let isMenuOpen = false;

            function toggleMenu() {
                isMenuOpen = !isMenuOpen;
                
                if (isMenuOpen) {
                    // Open menu
                    mobileMenu.classList.remove(&#39;opacity-0&#39;, &#39;pointer-events-none&#39;);
                    mobileMenu.classList.add(&#39;opacity-100&#39;, &#39;pointer-events-auto&#39;);
                    document.body.style.overflow = &#39;hidden&#39;; // Prevent scrolling
                    
                    // Animate hamburger to X
                    hamburgerLines[0].style.transform = &#39;rotate(45deg) translate(5px, 5px)&#39;;
                    hamburgerLines[1].style.opacity = &#39;0&#39;;
                    hamburgerLines[2].style.transform = &#39;rotate(-45deg) translate(5px, -5px)&#39;;
                    
                    // Ensure lines are white when menu is open regardless of scroll
                    hamburgerLines.forEach(line => line.style.backgroundColor = &#39;#FFFFFF&#39;);
                    logoText.style.color = &#39;#FFFFFF&#39;;
                } else {
                    // Close menu
                    mobileMenu.classList.add(&#39;opacity-0&#39;, &#39;pointer-events-none&#39;);
                    mobileMenu.classList.remove(&#39;opacity-100&#39;, &#39;pointer-events-auto&#39;);
                    document.body.style.overflow = &#39;&#39;; // Restore scrolling
                    
                    // Reset hamburger
                    hamburgerLines[0].style.transform = &#39;none&#39;;
                    hamburgerLines[1].style.opacity = &#39;1&#39;;
                    hamburgerLines[2].style.transform = &#39;none&#39;;
                    
                    // Restore colors based on scroll position
                    if (window.scrollY > 50) {
                        hamburgerLines.forEach(line => line.style.backgroundColor = &#39;#0A1628&#39;);
                        logoText.style.color = &#39;#0A1628&#39;;
                    }
                }
            }

            mobileBtn.addEventListener(&#39;click&#39;, toggleMenu);

            // Close mobile menu when a link is clicked
            mobileLinks.forEach(link => {
                link.addEventListener(&#39;click&#39;, () => {
                    if (isMenuOpen) toggleMenu();
                });
            });

            // 4. FAQ Accordion
            const accordionBtns = document.querySelectorAll(&#39;.accordion-btn&#39;);
            
            accordionBtns.forEach(btn => {
                btn.addEventListener(&#39;click&#39;, function() {
                    const content = this.nextElementSibling;
                    const icon = this.querySelector(&#39;i&#39;);
                    const isOpen = content.classList.contains(&#39;open&#39;);
                    
                    // Close all other accordions (optional, remove if you want multiple open)
                    document.querySelectorAll(&#39;.accordion-content&#39;).forEach(c => {
                        c.classList.remove(&#39;open&#39;);
                    });
                    document.querySelectorAll(&#39;.accordion-btn i&#39;).forEach(i => {
                        i.style.transform = &#39;rotate(0deg)&#39;;
                    });
                    
                    // Toggle current
                    if (!isOpen) {
                        content.classList.add(&#39;open&#39;);
                        icon.style.transform = &#39;rotate(45deg)&#39;;
                    }
                });
            });

            // 5. Contact Form Role Toggle
            const btnFounder = document.getElementById(&#39;btn-founder&#39;);
            const btnInvestor = document.getElementById(&#39;btn-investor&#39;);
            const formFounder = document.getElementById(&#39;form-founder&#39;);
            const formInvestor = document.getElementById(&#39;form-investor&#39;);

            if (btnFounder &amp;&amp; btnInvestor &amp;&amp; formFounder &amp;&amp; formInvestor) {
                btnFounder.addEventListener(&#39;click&#39;, () => {
                    // Update buttons
                    btnFounder.className = &#39;flex-1 py-3 px-6 rounded-lg font-semibold text-sm transition-all duration-300 bg-gold-500 text-navy-900 border-2 border-gold-500&#39;;
                    btnInvestor.className = &#39;flex-1 py-3 px-6 rounded-lg font-semibold text-sm transition-all duration-300 bg-transparent text-navy-900 border-2 border-gray-200 hover:border-gold-500&#39;;
                    
                    // Update forms
                    formFounder.classList.remove(&#39;hidden&#39;);
                    formFounder.classList.add(&#39;block&#39;);
                    formInvestor.classList.remove(&#39;block&#39;);
                    formInvestor.classList.add(&#39;hidden&#39;);
                });

                btnInvestor.addEventListener(&#39;click&#39;, () => {
                    // Update buttons
                    btnInvestor.className = &#39;flex-1 py-3 px-6 rounded-lg font-semibold text-sm transition-all duration-300 bg-gold-500 text-navy-900 border-2 border-gold-500&#39;;
                    btnFounder.className = &#39;flex-1 py-3 px-6 rounded-lg font-semibold text-sm transition-all duration-300 bg-transparent text-navy-900 border-2 border-gray-200 hover:border-gold-500&#39;;
                    
                    // Update forms
                    formInvestor.classList.remove(&#39;hidden&#39;);
                    formInvestor.classList.add(&#39;block&#39;);
                    formFounder.classList.remove(&#39;block&#39;);
                    formFounder.classList.add(&#39;hidden&#39;);
                });
            }
        });
    </script>
